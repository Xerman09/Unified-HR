name: Next.js CI/CD (Unified-HR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Unified-HR
        run: |
          APP_PATH="/home/vertex-server-2/system/general_sys/Unified-HR"
          
          # Make sure this matches the name you use when you start it in PM2
          PM2_NAME="unified-hr-system" 
          
          echo "Starting deployment to $APP_PATH"
          
          # Sync files but EXCLUDE package.json and all environment files
          rsync -a --delete \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='package.json' \
            --exclude='.env' \
            --exclude='.env.local' \
            ./ "$APP_PATH/"
            
          cd "$APP_PATH"
          
          # Build using the server's existing package.json
          npm run build
          
          # Restart the PM2 process
          pm2 restart "$PM2_NAME" || echo "Warning: PM2 process '$PM2_NAME' not found."
          
          echo "Unified-HR deployment complete!"