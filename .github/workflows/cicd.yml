name: Unified-HR CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality_check:
    name: Quality & Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high || echo "Audit found issues, please review."

      - name: Linting
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Unit Tests
        run: npm run test

      - name: Production Build Verification
        run: npm run build

  deploy:
    name: Deploy to Server
    needs: quality_check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Unified-HR
        run: |
          set -e
          APP_PATH="/home/vertex-server-2/system/general_sys/Unified-HR"
          PM2_NAME="unified-hr"
          
          echo "Starting deployment to $APP_PATH"
          
          # 1. Sync files (protecting .env and node_modules, but allowing package.json)
          rsync -a --delete \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.local' \
            ./ "$APP_PATH/"
            
          # 2. Enter the project folder
          cd "$APP_PATH"
          
          # 3. Ensure dependencies are up-to-date
          npm install
          npm run clean
          
          # 4. Build the application on the server
          npm run build
          
          # 5. Restart PM2
          pm2 restart "$PM2_NAME" || pm2 start npm --name "$PM2_NAME" -- run start
          
          # Save the PM2 list
          pm2 save
          
          echo "Unified-HR deployment and PM2 restart complete!"