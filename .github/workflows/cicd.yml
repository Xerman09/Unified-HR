name: Next.js CI/CD (Unified-HR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Unified-HR
        run: |
          APP_PATH="/home/vertex-server-2/system/general_sys/Unified-HR"
          PM2_NAME="unified-hr"
          
          echo "Starting deployment to $APP_PATH"
          
          # 1. Sync files (protecting package.json, .env, and node_modules)
          rsync -a --delete \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='package.json' \
            --exclude='.env' \
            --exclude='.env.local' \
            ./ "$APP_PATH/"
            
          # 2. Enter the project folder
          cd "$APP_PATH"
          
          # 3. Build the Next.js application
          npm run build
          
          # 4. Restart PM2. If it's not running yet, start it automatically!
          pm2 restart "$PM2_NAME" || pm2 start npm --name "$PM2_NAME" -- run start
          
          # Save the PM2 list so it survives server reboots
          pm2 save
          
          echo "Unified-HR deployment and PM2 restart complete!"